
<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Sovereign | High-Fidelity Hausa OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'silk-gold': '#D4AF37',
                'obsidian': '#030303',
                'deep-paper': '#080808',
                'ivory': '#FCFCF9',
                'parchment': 'rgba(252, 252, 249, 0.03)',
              },
              fontFamily: {
                'sans': ['"Inter"', 'sans-serif'],
                'serif': ['"Instrument Serif"', 'serif'],
                'mono': ['"JetBrains Mono"', 'monospace'],
              },
              animation: {
                'drift': 'drift 40s linear infinite',
                'reveal': 'reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                'glow': 'glow 3s ease-in-out infinite',
              },
              keyframes: {
                drift: {
                  '0%': { backgroundPosition: '0% 0%' },
                  '100%': { backgroundPosition: '100% 100%' },
                },
                reveal: {
                  '0%': { opacity: '0', transform: 'translateY(40px) scale(0.98)' },
                  '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                },
                glow: {
                  '0%, 100%': { opacity: '0.4', filter: 'drop-shadow(0 0 5px #D4AF37)' },
                  '50%': { opacity: '1', filter: 'drop-shadow(0 0 20px #D4AF37)' },
                }
              }
            }
          }
        }
    </script>
    <style>
        body { 
            background-color: #030303;
            color: #FCFCF9;
            overflow: hidden;
            height: 100dvh;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        /* Subtle noise texture for manuscript feel */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .manuscript-bubble {
            background: linear-gradient(165deg, rgba(12, 12, 12, 0.95) 0%, rgba(5, 5, 5, 1) 100%);
            border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            position: relative;
        }

        .manuscript-bubble::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        .zana-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .axiom-trace-container {
            border-left: 2px solid rgba(212, 175, 55, 0.1);
            padding-left: 1.5rem;
            margin-top: 1rem;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.05), transparent);
            animation: shimmer 2s infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="zana-grid"></div>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
