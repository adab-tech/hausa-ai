name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint:
    name: Lint & type-check (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9cd93d35bce5e39c11d98bc7a2d15ce10ca48e # v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: Mypy type check
        working-directory: backend
        run: mypy .

  test:
    name: Test & coverage (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9cd93d35bce5e39c11d98bc7a2d15ce10ca48e # v5.5.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install runtime dependencies (lightweight stubs only)
        working-directory: backend
        # Install only the FastAPI / Pydantic stack for unit tests;
        # torch / diffusers etc. are mocked and do not need to be installed in CI.
        run: |
          pip install \
            fastapi~=0.115.0 \
            "uvicorn[standard]~=0.30.0" \
            httpx~=0.27.0 \
            python-multipart~=0.0.9 \
            websockets~=12.0 \
            ollama~=0.3.0 \
            numpy~=1.26 \
            Pillow~=10.4.0

      - name: Install dev/test dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest --cov=. \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 --cov-fail-under=60 \
                 -v

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30
