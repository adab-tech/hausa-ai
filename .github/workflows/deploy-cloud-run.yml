name: Deploy Cloud Run (adabtech)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0675423068
  PROJECT_NUMBER: "1015422054034"
  REGION: europe-west1
  SERVICE: adabtech
  VERTEX_PROJECT_ID: gen-lang-client-0675423068
  VERTEX_LOCATION: europe-west1
  AR_REPOSITORY: adabtech
  IMAGE_NAME: adabtech

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check required GCP auth secrets
        id: gcp_secrets
        env:
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [[ "$GCP_WIF_PROVIDER" =~ ^[[:space:]]*$ ]] || [[ "$GCP_SERVICE_ACCOUNT" =~ ^[[:space:]]*$ ]]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Cloud Run deploy because required secrets are missing."
            echo "::notice::Set GCP_WIF_PROVIDER and GCP_SERVICE_ACCOUNT in Settings > Secrets and variables > Actions to enable deploys."
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud (WIF)
        if: steps.gcp_secrets.outputs.has_secrets == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v2.1.10
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: steps.gcp_secrets.outputs.has_secrets == 'true'
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.4
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        if: steps.gcp_secrets.outputs.has_secrets == 'true'
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        if: steps.gcp_secrets.outputs.has_secrets == 'true'
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        if: steps.gcp_secrets.outputs.has_secrets == 'true'
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --image "$IMAGE_URI" \
            --allow-unauthenticated \
            --set-env-vars "VERTEX_PROJECT_ID=${{ env.VERTEX_PROJECT_ID }},VERTEX_LOCATION=${{ env.VERTEX_LOCATION }}"
