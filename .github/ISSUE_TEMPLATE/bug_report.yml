name: Bug report
description: Report a bug or unexpected behaviour in Hausa-AI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Start the backend with `docker compose up`
        2. Send a chat message with "..."
        3. See error in browser console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant environment details.
      placeholder: |
        - OS: Ubuntu 22.04 / macOS 14 / Windows 11
        - Node.js version: 20.x
        - Python version: 3.11
        - Docker version: 26.x
        - Deployment mode: local / Docker Compose / Cloud Run
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs here (backend, browser console, Docker).
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the [CONTRIBUTING guide](../../blob/main/CONTRIBUTING.md).
          required: false
